<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0B1220;
      color: #F8FAFC;
    }
    .header {
      background-color: #131B2E;
      padding: 12px 16px;
      border-bottom: 1px solid #1E293B;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title {
      font-size: 14px;
      font-weight: 800;
      color: #3B82F6;
      text-transform: uppercase;
      margin: 0;
    }
    .status {
      font-size: 10px;
      color: #10B981;
      font-family: monospace;
    }
    .content {
      padding: 16px;
    }
    .card {
      background-color: #0F172A;
      border: 1px solid #1E293B;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 10px;
      color: #64748B;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .url {
      font-size: 11px;
      font-family: monospace;
      color: #E2E8F0;
      word-break: break-all;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1E293B;
    }
    .score-val {
      font-size: 18px;
      font-weight: bold;
      color: #EF4444;
      font-family: monospace;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #2563EB;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-bottom: 8px;
    }
    .btn-secondary {
      background-color: #0F172A;
      border: 1px solid #1E293B;
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <h1 class="title">CyberShield AI</h1>
    </div>
    <span class="status">🛡️ ACTIVE</span>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-title">Current Site Detected</div>
      <div id="active-url" class="url">verify-pwc-secure-portal.co-login-net.xyz</div>
      <div class="score-row">
        <span style="font-size: 11px; color: #64748B;">Trust Score:</span>
        <span id="score" class="score-val">12/100</span>
      </div>
    </div>
    
    <button class="btn" id="analyze-btn">Analyze Deeper with Platform</button>
    <button class="btn btn-secondary" id="dashboard-btn">Open Web Intelligence Center</button>
  </div>
</body>
</html>
